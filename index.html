<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>IGORBattle CS2 Elite</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0d1117;
            --panel: #161b22;
            --accent: #58a6ff;
            --gold: #f29100;
            --red: #ff3e3e; 
            --green: #238636;
            --rarity-2: #4b69ff;
            --rarity-3: #8847ff;
            --rarity-4: #d32ce6;
            --rarity-5: #eb4b4b;
            --rarity-6: #ffd700;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; }
        
        body { 
            background: url('back.jpg') no-repeat center center fixed; 
            background-size: cover; 
            color: #c9d1d9; 
            height: 100vh; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
        }

        header { padding: 15px; background: var(--panel); display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #30363d; z-index: 100; }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .balance-pill { display: flex; align-items: center; background: #21262d; border: 1px solid var(--gold); border-radius: 20px; overflow: hidden; height: 36px; transition: 0.3s; }
        .balance-tag { padding: 0 12px; color: var(--gold); font-weight: 800; font-size: 0.9rem; }
        .add-balance { background: var(--gold); color: #000; border: none; width: 36px; height: 100%; font-weight: 900; cursor: pointer; transition: 0.2s; }
        .header-icons { display: flex; gap: 15px; align-items: center; margin-left: 15px; }
        .icon-btn { font-size: 1.4rem; color: #8b949e; cursor: pointer; transition: 0.2s; position: relative; }
        .icon-btn.active-bonus { color: var(--gold); animation: pulse 1.5s infinite; }

        .dropdown { position: absolute; top: 55px; right: 10px; background: var(--panel); border: 1px solid #30363d; border-radius: 12px; width: 220px; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 1000; }
        .dropdown.active { display: block; animation: fadeInDown 0.2s ease; }
        .dropdown-item { padding: 12px 15px; border-bottom: 1px solid #30363d; display: flex; align-items: center; gap: 10px; font-size: 0.9rem; cursor: pointer; transition: 0.2s; }
        .dropdown-item:hover { background: #1c2128; color: #fff; border-left: 3px solid var(--accent); }

        main { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 80px; position: relative; z-index: 1; }
        .hidden { display: none !important; }

        .promo-banner { 
            background: linear-gradient(90deg, #f29100, #ff5e00); color: #000; padding: 12px; border-radius: 12px; 
            margin-bottom: 20px; text-align: center; font-weight: 900; text-transform: uppercase; 
            box-shadow: 0 4px 15px rgba(242, 145, 0, 0.3); animation: pulse 2s infinite; cursor: pointer;
            transition: 0.2s; max-width: 1200px; margin-left: auto; margin-right: auto;
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; max-width: 1200px; margin: 0 auto; }
        .card { background: var(--panel); border-radius: 12px; padding: 15px; text-align: center; border: 1px solid #30363d; cursor: pointer; position: relative; transition: transform 0.2s ease-in-out; display: flex; flex-direction: column; align-items: center;}
        .card:hover { transform: scale(1.03); z-index: 2; }
        .card.selected { border-color: var(--gold); background: #1c2128; box-shadow: 0 0 15px rgba(242, 145, 0, 0.4); }
        .card-price { color: var(--gold); font-weight: bold; margin-top: 5px; }

        .case-display {
            position: relative; width: 120px; height: 120px; margin: 0 auto 15px;
            border-radius: 12px; background-color: #21262d; border: 2px solid #3a4050;
            box-shadow: 0 8px 0 #0d0f14, 0 15px 20px rgba(0,0,0,0.6);
            background-size: 80%; background-position: center; background-repeat: no-repeat;
            transform: perspective(500px) rotateX(5deg); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden; display: flex; align-items: center; justify-content: center;
        }

        .skin-icon { width: 80px; height: 80px; object-fit: contain; margin-bottom: 8px; transition: 0.3s; }
        .m-win-icon { width: 140px; height: 140px; object-fit: contain; margin: 20px auto; display: block; filter: drop-shadow(0 0 20px rgba(255,255,255,0.2)); }

        .inv-card { border-bottom-width: 4px; border-bottom-style: solid; }
        .inv-header { display: flex; justify-content: space-between; align-items: center; background: var(--panel); padding: 12px 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #30363d; max-width: 1200px; margin: 0 auto 15px auto;}

        .upgrade-container { text-align: center; padding: 10px; max-width: 800px; margin: 0 auto;}
        
        /* ОБНОВЛЕННОЕ КОЛЕСО КАК НА СКРИНЕ */
        .circle-box { 
            position: relative; 
            width: 320px; 
            height: 320px; 
            margin: 40px auto; 
            background: radial-gradient(circle, #1a1e26 0%, #0d1117 100%); 
            border-radius: 50%; 
            border: 8px solid #252a33; 
            box-shadow: 0 0 50px rgba(0,0,0,0.8), inset 0 0 30px rgba(0,0,0,0.5); 
        }
        
        .circle-markers {
            position: absolute; inset: -35px; pointer-events: none;
            font-weight: bold; color: #4a515e; font-size: 0.8rem;
        }
        .marker { position: absolute; transform: translate(-50%, -50%); }
        .marker.top { top: 0; left: 50%; color: #52a038; }
        .marker.bottom { bottom: -20px; left: 50%; color: #eb4b4b; }
        .marker.left { left: 0; top: 50%; }
        .marker.right { right: -20px; top: 50%; }

        .visual-circle { 
            position: absolute; 
            inset: 0; 
            border-radius: 50%; 
            transition: background 0.4s ease;
            filter: blur(1px);
        }
        
        .circle-inner { 
            position: absolute; 
            inset: 25px; 
            background: #0d1117; 
            border-radius: 50%; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            z-index: 15; 
            border: 2px solid #2a313c; 
            box-shadow: inset 0 0 20px #000;
        }
        
        /* СТРЕЛКА-ШЕВРОН КАК НА СКРИНЕ */
        .arrow-wrapper {
            position: absolute;
            inset: 0;
            z-index: 30;
            transition: transform 6s cubic-bezier(0.15, 0.9, 0.2, 1);
            transform: rotate(0deg);
        }
        .arrow-head {
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            filter: drop-shadow(0 0 10px #70ff4d);
        }
        .chevron {
            width: 24px; height: 12px;
            background: #70ff4d;
            clip-path: polygon(50% 0%, 100% 100%, 50% 70%, 0% 100%);
            margin-bottom: -4px;
        }
        .chevron.dim { opacity: 0.5; transform: scale(0.8); }

        #upg-result-text {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 2.5rem; font-weight: 900; z-index: 40; text-shadow: 0 0 20px currentColor;
        }

        .mult-btns { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin: 15px 0; }
        .m-btn { background: #21262d; border: 1px solid #30363d; color: white; padding: 8px 12px; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .m-btn.active { background: var(--accent); border-color: var(--accent); }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); z-index: 500; display: none; flex-direction: column; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s ease; }
        .modal.active { display: flex; opacity: 1; }
        .modal-content { background: var(--panel); padding: 20px; border-radius: 15px; width: 90%; max-width: 400px; border: 1px solid #30363d; }

        .track-wrap { width: 100%; height: 160px; overflow: hidden; position: relative; background: #050505; border-top: 1px solid #333; border-bottom: 1px solid #333; }
        .track { display: flex; position: absolute; height: 100%; align-items: center; left: 0; }
        .t-item { min-width: 130px; height: 140px; background: #161b22; margin: 0 5px; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-bottom: 4px solid #333; }
        
        .btn-main { width: 100%; max-width: 250px; padding: 15px; border-radius: 10px; border: none; font-weight: bold; background: var(--accent); color: white; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .btn-main:disabled { opacity: 0.5; cursor: not-allowed; }

        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: var(--panel); border-left: 4px solid var(--accent); padding: 15px 20px; border-radius: 8px; color: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.5); display: flex; align-items: center; gap: 12px; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes toastOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100%); opacity: 0; } }
        .burn-anim { animation: burnItem 0.8s forwards !important; }
        @keyframes burnItem { 0% { transform: scale(1); } 100% { transform: scale(0.1); opacity: 0; } }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <div onclick="App.UI.openPage('shop')" style="font-weight: 900; font-size: 1.2rem; cursor:pointer">IGOR<span style="color:var(--gold)">BATTLE</span></div>
    </div>
    <div style="display: flex; align-items: center;">
        <div class="balance-pill">
            <div class="balance-tag" id="balance">0 ₽</div>
            <button class="add-balance" onclick="if(App.requireAuth()) App.UI.openModalBox('modal-deposit')">+</button>
        </div>
        <div class="header-icons">
            <i class="fas fa-volume-up icon-btn" id="sound-btn" onclick="App.Sounds.toggle()"></i>
            <i class="fas fa-gift icon-btn" id="daily-btn" onclick="if(App.requireAuth()) App.Daily.claim()"></i>
            <i class="fas fa-bars icon-btn" onclick="App.UI.toggleMenu()"></i>
            <div class="dropdown" id="userDropdown">
                <div class="dropdown-item" onclick="App.UI.openModalBox('modal-profile'); App.UI.toggleMenu();"><i class="fas fa-user-circle"></i> <span id="menu-user-name">Профиль</span></div>
                <div class="dropdown-item" onclick="App.UI.openPage('shop')"><i class="fas fa-box-open"></i> Магазин</div>
                <div class="dropdown-item" onclick="App.UI.openPage('inv')"><i class="fas fa-stream"></i> Инвентарь</div>
                <div class="dropdown-item" onclick="App.UI.openPage('upgrade')"><i class="fas fa-bolt"></i> Апгрейд</div>
                <div class="dropdown-item" onclick="App.UI.openPage('contracts')"><i class="fas fa-file-contract"></i> Контракты</div>
            </div>
        </div>
    </div>
</header>

<main id="p-shop">
    <div class="promo-banner" id="promo-banner-text" onclick="if(App.requireAuth()) App.Promo.use()">ЗАГРУЗКА...</div>
    <div class="grid" id="cases-list"></div>
</main>

<main id="p-inv" class="hidden">
    <div class="inv-header">
        <div>Предметов: <span id="inv-count" style="color:var(--accent)">0</span></div>
        <div>Сумма: <span id="inv-value" style="color:var(--gold)">0 ₽</span></div>
    </div>
    <div class="grid" id="inv-list"></div>
</main>

<main id="p-upgrade" class="hidden">
    <div class="upgrade-container">
        <div class="circle-box">
            <div class="circle-markers">
                <span class="marker top">100%</span>
                <span class="marker bottom">0%</span>
                <span class="marker left">50%</span>
                <span class="marker right">50%</span>
            </div>
            <div class="visual-circle" id="upg-visual"></div>
            <div class="circle-inner">
                <div id="upg-chance" style="font-size: 3.5rem; font-weight: 900; color: #f2f200; line-height: 1;">0.00%</div>
                <div style="color: #8b949e; font-size: 0.9rem; margin-top: 5px;">средний шанс</div>
                <div id="upg-target" style="color:var(--gold); font-size: 1.2rem; margin-top: 15px;">0 ₽</div>
                <div id="sel-name" style="font-size: 0.9rem; margin-top: 5px; color: #aaa;">Выберите предмет</div>
                <div id="upg-result-text"></div>
            </div>
            <div class="arrow-wrapper" id="upg-arrow-wrap">
                <div class="arrow-head">
                    <div class="chevron"></div>
                    <div class="chevron dim"></div>
                </div>
            </div>
        </div>
        
        <div class="mult-btns">
            <button class="m-btn" onclick="App.Logic.setMult(1.5, this)">1.5x</button>
            <button class="m-btn active" onclick="App.Logic.setMult(2, this)">2x</button>
            <button class="m-btn" onclick="App.Logic.setMult(5, this)">5x</button>
            <button class="m-btn" onclick="App.Logic.setMult(10, this)">10x</button>
            <input type="number" id="custom-mult" placeholder="Свой X" step="0.1" min="1.1" oninput="App.Logic.setCustomMult(this.value)" style="width: 80px; background:#0d1117; border:1px solid #333; color:white; padding:5px; border-radius:5px; text-align:center;">
        </div>
        
        <button class="btn-main" id="btn-run-upg" disabled onclick="App.Logic.doUpgrade()">УЛУЧШИТЬ</button>
        <div class="grid" id="upg-inv-list" style="margin-top:20px"></div>
    </div>
</main>

<main id="p-contracts" class="hidden">
    <div class="grid" id="contract-inv-list"></div>
</main>

<!-- Modals -->
<div class="modal" id="modal-profile" onclick="if(event.target===this) App.UI.closeModalBox('modal-profile')">
    <div class="modal-content" id="tab-profile">
        <h3 id="prof-username" style="color:var(--accent); text-align:center;">Игрок</h3>
        <button class="btn-main" id="btn-logout" style="width:100%; background:var(--red); margin-top:15px;" onclick="App.Auth.logout()">ВЫЙТИ</button>
    </div>
</div>

<div class="modal" id="modal-deposit" onclick="if(event.target===this) App.UI.closeModalBox('modal-deposit')">
    <div class="modal-content">
        <h3 style="margin-bottom: 15px; text-align:center;">Пополнение</h3>
        <input type="number" id="dep-amount" placeholder="Сумма" style="width:100%; padding:10px; background:#0d1117; color:white; border:1px solid #333; border-radius:8px;">
        <button class="btn-main" style="width: 100%" onclick="App.Logic.processDeposit()">ПОПОЛНИТЬ</button>
    </div>
</div>

<div class="modal" id="modal-open">
    <div id="m-spinner" style="text-align:center; margin:auto;"><h3 style="color: var(--gold);">ОТКРЫВАЕМ...</h3></div>
    <div class="track-wrap hidden" id="roulette-box">
        <div style="position: absolute; left: 50%; top: 0; bottom: 0; width: 3px; background: var(--red); z-index: 10;"></div>
        <div class="track" id="m-track"></div>
    </div>
    <div id="m-result" class="hidden" style="text-align:center;">
        <img id="m-win-icon" class="m-win-icon">
        <h2 id="m-win-name">Скин</h2>
        <h1 id="m-win-price" style="color:var(--gold); margin-bottom: 20px;">0 ₽</h1>
        <div style="display:flex; gap:10px; justify-content:center;">
            <button class="btn-main" style="background:var(--green); width:120px;" onclick="App.Logic.finishOpen(true)">ОСТАВИТЬ</button>
            <button class="btn-main" style="background:#444; width:120px;" onclick="App.Logic.finishOpen(false)">ПРОДАТЬ</button>
        </div>
    </div>
</div>

<div id="toast-container"></div>

<script>
const App = {
    currentUser: null, state: {},
    config: {
        cases:[
            { name: "Звёзды", price: 20, image: "https://steamcommunity-a.akamaihd.net/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXU5A1PIYQNqhpOSV-fRPasw8rsQEl9Jg9SpIW1Kgx07OXJYzRD4si72tHbwX2wML-HljoDscEpi7mSotigiw22_EBoNz_3ctDAdQE9O1HpwA" },
            { name: "Петровна", price: 50, image: "petrovna.jpg" },
            { name: "Яковлевна", price: 100, image: "yakovlevna.jpg" },
            { name: "МАма", price: 500, image: "MAma.jpg" },
            { name: "Князь Можаев", price: 2500, image: "kniazmojaev.jpg" },
            { name: "Дэнис", price: 4500, image: "denis.jpg" },
            { name: "Светлана", price: 7000, image: "svetlana.jpg" },
            { name: "Братва", price: 15000, image: "bratva.jpg" },
            { name: "Кэрил", price: 20000, image: "keril.jpg" }
        ]
    },
    skins: {
        catalog: {
            2:[ { name: "P250 | Sand Dune", img: "https://community.cloudflare.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpoo6m1FBRp3_bNdTRD-Th6cU-Pwb-mNuqIlWJTvcqg8b6Rpt72igXtrkVqNmr6IILAdFBsNVyGqVm4wu3pgsW4vsuayiMxs3V2tXbYnBK-hBhKaeBxxavJoSbdS2c/200fx200f" } ],
            3:[ { name: "AK-47 | Slate", img: "https://community.cloudflare.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpot7HxfDhnwMzJemkV08ykm4aOhOT9PLXQmlRZ7cRnk6eVrNzw2AHiqUI-YT_wcNKUdFE4aVyD81jqk-fs0Zfptc-anyE373IrtHaLzkHjhA4MMLIK2cOclw/200fx200f" } ],
            4:[ { name: "AK-47 | Redline", img: "https://community.cloudflare.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpot7HxfDhjxszJemkV092lnYmGmOHLO77QgHIfvsogjLiYpY2i0FHg-kFvZ2-mcYOWcgZrZAqD-AS4xe28jMC-6c7MnCF9-n51_yIftA/200fx200f" } ],
            5:[ { name: "AWP | Asiimov", img: "https://community.cloudflare.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpot621FAR17P7NdTRH-t26q4SZlvD7PYTdn2xZ_Ish0u3A9Nj2jQO1-BE_Ym-lcIOLIAA3ZwrSqQe6wL3phJ--zZzAmHth6HRzsXePnxDilx1EaA/200fx200f" } ],
            6:[ { name: "★ Karambit | Fade", img: "https://community.cloudflare.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpovbSsLQJf2PLacDBA5ciJlY20kPb5Prruxn0Iu8chiu2Q9tX22wHn_xVpYTrwctSTdwM8aV3S_AS-wevp1sS9vsidziNq7CAn5HqInhS20xtMabRuhw/200fx200f" } ]
        }
    },

    getDefaultState: () => ({
        balance: 1000, inventory:[], stats: { casesOpened: 0, totalSpent: 0, totalEarned: 0 },
        dailyBonus: { available: true }, activeAction: false, mult: 2, currentWin: null, upgSelected: null
    }),

    // ЛОГИКА ВЫПАДЕНИЯ (НОВАЯ ЭКОНОМИКА)
    Generators: {
        lootItem: function(caseName) {
            let c = App.config.cases.find(x => x.name === caseName) || App.config.cases[0];
            let rnd = Math.random();
            let priceMultiplier, targetRarity;

            // 38% шанс на окуп (профит)
            if (rnd <= 0.38) {
                // Выигрыш от 110% до 400% от цены кейса
                priceMultiplier = 1.1 + (Math.random() * 2.9);
                targetRarity = Math.random() < 0.1 ? 6 : (Math.random() < 0.4 ? 5 : 4);
            } else {
                // Проигрыш: минимум 10%, в среднем падает 30-80%
                priceMultiplier = 0.1 + (Math.random() * 0.85); 
                targetRarity = Math.random() < 0.3 ? 3 : 2;
            }

            let finalPrice = Math.floor(c.price * priceMultiplier);
            if (finalPrice < 1) finalPrice = 1;

            let pool = App.skins.catalog[targetRarity] || App.skins.catalog[2];
            let selected = pool[Math.floor(Math.random() * pool.length)];

            return { 
                name: selected.name, price: finalPrice, rarity: targetRarity, 
                iconUrl: selected.img, id: Date.now() + Math.random() 
            };
        }
    },

    init: function() {
        this.Storage.load();
        this.UI.renderShop();
        this.UI.updateUI();
        if(!this.currentUser) {
            this.currentUser = "Player";
            this.state = this.getDefaultState();
        }
    },

    requireAuth: () => true,

    Storage: {
        save: () => { if(App.currentUser) localStorage.setItem('ib_save', JSON.stringify(App.state)); },
        load: () => { const d = localStorage.getItem('ib_save'); if(d) App.state = JSON.parse(d); else App.state = App.getDefaultState(); }
    },

    Auth: {
        logout: () => { App.state = App.getDefaultState(); App.UI.updateUI(); App.UI.closeModalBox('modal-profile'); }
    },

    Logic: {
        processDeposit: () => {
            let a = parseFloat(document.getElementById('dep-amount').value);
            if(a > 0) { App.state.balance += a; App.Storage.save(); App.UI.updateUI(); App.UI.closeModalBox('modal-deposit'); }
        },
        startOpen: (caseName) => {
            if(App.state.activeAction) return;
            const c = App.config.cases.find(x => x.name === caseName);
            if(App.state.balance < c.price) return App.UI.showToast("Мало денег!", "error");
            
            App.state.activeAction = true;
            App.state.balance -= c.price;
            App.state.stats.casesOpened++;
            App.state.stats.totalSpent += c.price;
            
            const pool = [];
            for(let i=0; i<60; i++) pool.push(App.Generators.lootItem(caseName));
            App.state.currentWin = pool[40];

            App.UI.openModalBox('modal-open');
            document.getElementById('m-spinner').classList.remove('hidden');
            document.getElementById('roulette-box').classList.add('hidden');
            document.getElementById('m-result').classList.add('hidden');

            setTimeout(() => {
                document.getElementById('m-spinner').classList.add('hidden');
                document.getElementById('roulette-box').classList.remove('hidden');
                const track = document.getElementById('m-track');
                track.style.transition = 'none';
                track.style.transform = 'translateX(0)';
                track.innerHTML = pool.map(i => `<div class="t-item"><img src="${i.iconUrl}" width="80"></div>`).join('');
                
                setTimeout(() => {
                    track.style.transition = 'transform 5s cubic-bezier(0.1, 0, 0.2, 1)';
                    track.style.transform = `translateX(-${(40 * 140) - (window.innerWidth/2) + 70}px)`;
                }, 50);

                setTimeout(() => {
                    document.getElementById('roulette-box').classList.add('hidden');
                    document.getElementById('m-result').classList.remove('hidden');
                    document.getElementById('m-win-name').innerText = App.state.currentWin.name;
                    document.getElementById('m-win-price').innerText = App.state.currentWin.price + " ₽";
                    document.getElementById('m-win-icon').src = App.state.currentWin.currentWin?.iconUrl || App.state.currentWin.iconUrl;
                }, 5500);
            }, 800);
        },
        finishOpen: (keep) => {
            if(keep) App.state.inventory.push(App.state.currentWin);
            else App.state.balance += App.state.currentWin.price;
            App.state.activeAction = false;
            App.Storage.save();
            App.UI.updateUI();
            App.UI.closeModalBox('modal-open');
        },
        setMult: (m, b) => {
            App.state.mult = m;
            document.querySelectorAll('.m-btn').forEach(x => x.classList.remove('active'));
            if(b) b.classList.add('active');
            App.UI.updateUpgCircle();
        },
        setCustomMult: (v) => { App.state.mult = parseFloat(v) || 1.1; App.UI.updateUpgCircle(); },
        selectForUpg: (id) => {
            App.state.upgSelected = App.state.inventory.find(x => x.id == id);
            App.UI.renderUpgInv();
            App.UI.updateUpgCircle();
        },
        doUpgrade: () => {
            if(App.state.activeAction || !App.state.upgSelected) return;
            App.state.activeAction = true;
            document.getElementById('btn-run-upg').disabled = true;

            const chance = 1 / App.state.mult;
            const isWin = Math.random() <= chance;
            const arrowWrap = document.getElementById('upg-arrow-wrap');
            
            // На скриншоте 0% внизу, заполнение идет по кругу.
            // Настроим финальный угол: 0% = 0deg (низ), 50% = 180deg (верх), 100% = 360deg.
            // Но обычно сектор успеха внизу. Настроим чтобы стрелка крутилась.
            
            const fullSpins = 5 + Math.floor(Math.random() * 5);
            const chanceDeg = chance * 360;
            
            // Угол успеха - сектор [0, chanceDeg]
            let targetDeg;
            if(isWin) targetDeg = (Math.random() * chanceDeg);
            else targetDeg = chanceDeg + (Math.random() * (360 - chanceDeg));
            
            const totalDeg = (fullSpins * 360) + targetDeg;
            arrowWrap.style.transform = `rotate(${totalDeg}deg)`;

            setTimeout(() => {
                const res = document.getElementById('upg-result-text');
                res.style.display = 'block';
                if(isWin) {
                    res.innerText = "УСПЕХ!"; res.style.color = "#70ff4d";
                    App.state.upgSelected.price = Math.floor(App.state.upgSelected.price * App.state.mult);
                    App.state.upgSelected.rarity = 6;
                } else {
                    res.innerText = "ПРОВАЛ"; res.style.color = "#ff3e3e";
                    App.state.inventory = App.state.inventory.filter(x => x.id !== App.state.upgSelected.id);
                }
                
                setTimeout(() => {
                    App.state.activeAction = false;
                    App.state.upgSelected = null;
                    res.style.display = 'none';
                    arrowWrap.style.transition = 'none';
                    arrowWrap.style.transform = 'rotate(0deg)';
                    setTimeout(() => arrowWrap.style.transition = 'transform 6s cubic-bezier(0.15, 0.9, 0.2, 1)', 50);
                    App.Storage.save();
                    App.UI.updateUI();
                    App.UI.renderUpgInv();
                    App.UI.updateUpgCircle();
                }, 2000);
            }, 6100);
        }
    },

    UI: {
        updateUI: () => {
            document.getElementById('balance').innerText = Math.floor(App.state.balance) + " ₽";
            document.getElementById('inv-count').innerText = App.state.inventory.length;
            document.getElementById('inv-value').innerText = App.state.inventory.reduce((a,b) => a+b.price, 0) + " ₽";
        },
        renderShop: () => {
            document.getElementById('cases-list').innerHTML = App.config.cases.map(c => `
                <div class="card" onclick="App.Logic.startOpen('${c.name}')">
                    <div class="case-display" style="background-image: url('${c.image}');"></div>
                    <div style="font-weight:bold;">${c.name}</div>
                    <div class="card-price">${c.price} ₽</div>
                </div>
            `).join('');
        },
        renderInv: () => {
            document.getElementById('inv-list').innerHTML = App.state.inventory.map(i => `
                <div class="card inv-card" style="border-bottom-color: var(--rarity-${i.rarity})">
                    <img src="${i.iconUrl}" class="skin-icon">
                    <div style="font-size:0.8rem;">${i.name}</div>
                    <div class="card-price">${i.price} ₽</div>
                </div>
            `).join('');
        },
        renderUpgInv: () => {
            document.getElementById('upg-inv-list').innerHTML = App.state.inventory.map(i => `
                <div class="card inv-card ${App.state.upgSelected?.id == i.id ? 'selected' : ''}" onclick="App.Logic.selectForUpg('${i.id}')">
                    <img src="${i.iconUrl}" width="60">
                    <div style="font-size:0.7rem;">${i.price} ₽</div>
                </div>
            `).join('');
        },
        updateUpgCircle: function() {
            if(!App.state.upgSelected) {
                document.getElementById('upg-chance').innerText = "0.00%";
                document.getElementById('upg-visual').style.background = 'none';
                document.getElementById('upg-target').innerText = "0 ₽";
                document.getElementById('btn-run-upg').disabled = true;
                return;
            }
            const chance = 1 / App.state.mult;
            const deg = chance * 360;
            document.getElementById('upg-chance').innerText = (chance * 100).toFixed(2) + "%";
            document.getElementById('upg-target').innerText = Math.floor(App.state.upgSelected.price * App.state.mult) + " ₽";
            document.getElementById('sel-name').innerText = App.state.upgSelected.name;
            document.getElementById('upg-visual').style.background = `conic-gradient(from 0deg, #52a038 0deg ${deg}deg, transparent ${deg}deg 360deg)`;
            document.getElementById('btn-run-upg').disabled = false;
        },
        openPage: (p) => {
            document.querySelectorAll('main').forEach(x => x.classList.add('hidden'));
            document.getElementById('p-'+p).classList.remove('hidden');
            if(p == 'inv') App.UI.renderInv();
            if(p == 'upgrade') App.UI.renderUpgInv();
        },
        openModalBox: (id) => document.getElementById(id).classList.add('active'),
        closeModalBox: (id) => document.getElementById(id).classList.remove('active'),
        toggleMenu: () => document.getElementById('userDropdown').classList.toggle('active'),
        showToast: (m, t) => {
            const c = document.getElementById('toast-container');
            const e = document.createElement('div'); e.className = 'toast'; e.innerText = m;
            c.appendChild(e); setTimeout(() => e.remove(), 3000);
        },
        Promo: { use: () => App.UI.showToast("Промокод активирован!", "success") },
        Daily: { claim: () => App.UI.showToast("Бонус получен!", "success") },
        Sounds: { toggle: () => {} }
    }
};

window.onload = () => App.init();
</script>
</body>
</html>
