<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>IGORBattle CS2 Elite</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0d1117;
            --panel: #161b22;
            --accent: #58a6ff;
            --gold: #f29100;
            --red: #ff3e3e; 
            --green: #238636;
            --rarity-2: #4b69ff; /* Синие */
            --rarity-3: #8847ff; /* Фиолетовые */
            --rarity-4: #d32ce6; /* Розовые */
            --rarity-5: #eb4b4b; /* Красные */
            --rarity-6: #ffd700; /* Золотые */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; }
        
        body { 
            background: url('back.jpg') no-repeat center center fixed; 
            background-size: cover; 
            color: #c9d1d9; 
            height: 100vh; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
        }

        header { padding: 15px; background: var(--panel); display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #30363d; z-index: 100; }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .balance-pill { display: flex; align-items: center; background: #21262d; border: 1px solid var(--gold); border-radius: 20px; overflow: hidden; height: 36px; transition: 0.3s; }
        .balance-tag { padding: 0 12px; color: var(--gold); font-weight: 800; font-size: 0.9rem; }
        .add-balance { background: var(--gold); color: #000; border: none; width: 36px; height: 100%; font-weight: 900; cursor: pointer; transition: 0.2s; }

        .header-icons { display: flex; gap: 15px; align-items: center; margin-left: 15px; }
        .icon-btn { font-size: 1.4rem; color: #8b949e; cursor: pointer; transition: 0.2s; position: relative; }
        .icon-btn.active-bonus { color: var(--gold); animation: pulse 1.5s infinite; }

        .dropdown { position: absolute; top: 55px; right: 10px; background: var(--panel); border: 1px solid #30363d; border-radius: 12px; width: 220px; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 1000; }
        .dropdown.active { display: block; animation: fadeInDown 0.2s ease; }
        .dropdown-item { padding: 12px 15px; border-bottom: 1px solid #30363d; display: flex; align-items: center; gap: 10px; font-size: 0.9rem; cursor: pointer; }
        .dropdown-item:hover { background: #1c2128; color: #fff; }

        main { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 80px; position: relative; z-index: 1; }
        .hidden { display: none !important; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; max-width: 1200px; margin: 0 auto; }
        .card { background: var(--panel); border-radius: 12px; padding: 15px; text-align: center; border: 1px solid #30363d; cursor: pointer; position: relative; transition: transform 0.2s; display: flex; flex-direction: column; align-items: center;}
        .card:hover { transform: scale(1.03); z-index: 2; }
        .card-price { color: var(--gold); font-weight: bold; margin-top: 5px; }

        /* CASE VIEW PAGE (Как на картинке) */
        .case-hero { text-align: center; padding: 20px 0; max-width: 1000px; margin: 0 auto; }
        .case-title-big { font-size: 2.2rem; font-weight: 900; text-transform: uppercase; margin-bottom: 25px; letter-spacing: 2px; }
        .case-main-img { width: 300px; height: 300px; object-fit: contain; margin-bottom: 25px; filter: drop-shadow(0 0 30px rgba(88, 166, 255, 0.2)); }
        .open-btn-large { 
            background: var(--gold); color: #000; border: none; padding: 15px 60px; border-radius: 8px; 
            font-size: 1.3rem; font-weight: 900; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 20px rgba(242,145,0,0.4);
        }
        .open-btn-large:hover { transform: scale(1.05); filter: brightness(1.1); }
        .contents-header { margin-top: 50px; padding-top: 20px; border-top: 1px solid #333; color: #8b949e; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 25px; }

        .case-display {
            position: relative; width: 120px; height: 120px; margin: 0 auto 15px;
            border-radius: 12px; background-color: #21262d; border: 2px solid #3a4050;
            box-shadow: 0 8px 0 #0d0f14, 0 15px 20px rgba(0,0,0,0.6);
            background-size: 80%; background-position: center; background-repeat: no-repeat;
        }

        .skin-icon { width: 80px; height: 80px; object-fit: contain; margin-bottom: 8px; filter: drop-shadow(0 0 8px rgba(255,255,255,0.1)); }
        .m-win-icon { width: 160px; height: 160px; object-fit: contain; margin: 20px auto; display: block; filter: drop-shadow(0 0 25px rgba(255,255,255,0.2)); }

        .inv-card { border-bottom-width: 4px; border-bottom-style: solid; }
        .inv-header { display: flex; justify-content: space-between; align-items: center; background: var(--panel); padding: 12px 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #30363d; max-width: 1200px; margin-left: auto; margin-right: auto;}

        /* UPGRADE WHEEL (Case-Battle Style) */
        .upgrade-container { text-align: center; padding: 10px; max-width: 800px; margin: 0 auto;}
        
        .circle-box { 
            position: relative; 
            width: 340px; height: 340px; 
            margin: 40px auto; 
            background: #11141a; 
            border-radius: 50%; 
            border: 8px solid #2a313c; 
            overflow: visible;
            box-shadow: 0 0 50px rgba(0,0,0,0.8); 
        }
        
        .circle-markers {
            position: absolute; inset: -35px; pointer-events: none;
            font-weight: bold; color: #4a515e; font-size: 0.85rem;
        }
        .marker { position: absolute; transform: translate(-50%, -50%); }
        .marker.top { top: 0; left: 50%; color: #52a038; }
        .marker.bottom { bottom: -15px; left: 50%; color: #eb4b4b; }
        .marker.left { left: 0; top: 50%; }
        .marker.right { right: -15px; top: 50%; }

        .visual-circle { 
            position: absolute; inset: 0; border-radius: 50%; 
            transition: background 0.4s ease;
            /* Сектор заполненный внутри как на картинке */
            background: radial-gradient(circle, transparent 40%, rgba(255, 62, 62, 0.1) 41%);
        }
        
        .circle-inner { 
            position: absolute; inset: 25px; 
            background: #0d1117; 
            border-radius: 50%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 15; 
            border: 2px solid #2a313c; 
            box-shadow: inset 0 0 30px #000;
        }

        /* ГРАДИЕНТ ВНУТРИ СЕКТОРА ВЫИГРЫША */
        .upg-gradient-overlay {
            position: absolute; inset: 0; border-radius: 50%;
            background: radial-gradient(circle at 50% 100%, #eb4b4b 0%, #f29100 50%, #52a038 100%);
            opacity: 0.3; pointer-events: none; z-index: 5;
            mask-image: radial-gradient(circle, transparent 50%, black 51%);
            -webkit-mask-image: radial-gradient(circle, transparent 50%, black 51%);
        }
        
        /* ШЕВРОН (СТРЕЛКА) */
        .chevron-arrow-wrap {
            position: absolute; inset: 0; z-index: 30;
            transition: transform 6s cubic-bezier(0.1, 0, 0.1, 1);
            transform: rotate(0deg);
        }
        .chevron-arrow {
            position: absolute; bottom: -20px; left: 50%;
            transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center;
        }
        .chevron-part {
            width: 26px; height: 12px;
            background: #70ff4d; /* Неоновый зеленый */
            clip-path: polygon(50% 0%, 100% 100%, 50% 75%, 0% 100%);
            margin-bottom: -5px;
            filter: drop-shadow(0 0 10px #70ff4d);
        }
        .chevron-part:last-child { opacity: 0.5; transform: scale(0.8); }

        #upg-result-text {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 2.5rem; font-weight: 900; z-index: 40; text-shadow: 0 0 20px currentColor;
        }

        .mult-btns { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin: 15px 0; }
        .m-btn { background: #21262d; border: 1px solid #30363d; color: white; padding: 8px 12px; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .m-btn.active { background: var(--accent); border-color: var(--accent); }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); z-index: 500; display: none; flex-direction: column; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s ease; }
        .modal.active { display: flex; opacity: 1; }
        .modal-content { background: var(--panel); padding: 20px; border-radius: 15px; width: 90%; max-width: 400px; border: 1px solid #30363d; }

        .track-wrap { width: 100%; height: 160px; overflow: hidden; position: relative; background: #050505; border-top: 1px solid #333; border-bottom: 1px solid #333; }
        .track { display: flex; position: absolute; height: 100%; align-items: center; left: 0; }
        .t-item { min-width: 140px; height: 140px; background: #161b22; margin: 0 5px; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-bottom: 4px solid #333; }
        
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast { background: var(--panel); border-left: 4px solid var(--accent); padding: 15px 20px; border-radius: 8px; color: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.5); animation: toastIn 0.4s forwards; display: flex; align-items: center; gap: 12px; }

        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes toastIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes popIn { 0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <div onclick="App.UI.openPage('shop')" style="font-weight: 900; font-size: 1.2rem; cursor:pointer">IGOR<span style="color:var(--gold)">BATTLE</span></div>
    </div>
    <div style="display: flex; align-items: center;">
        <div class="balance-pill">
            <div class="balance-tag" id="balance">0 ₽</div>
            <button class="add-balance" onclick="App.UI.openModalBox('modal-deposit')">+</button>
        </div>
        <div class="header-icons">
            <i class="fas fa-volume-up icon-btn" id="sound-btn" onclick="App.Sounds.toggle()"></i>
            <i class="fas fa-gift icon-btn" id="daily-btn" onclick="App.Daily.claim()"></i>
            <i class="fas fa-bars icon-btn" onclick="App.UI.toggleMenu()"></i>
            
            <div class="dropdown" id="userDropdown">
                <div class="dropdown-item" onclick="App.UI.openModalBox('modal-profile'); App.UI.toggleMenu();"><i class="fas fa-user-circle"></i> Профиль</div>
                <div class="dropdown-item" onclick="App.UI.openPage('shop')"><i class="fas fa-box-open"></i> Магазин</div>
                <div class="dropdown-item" onclick="App.UI.openPage('inv')"><i class="fas fa-stream"></i> Инвентарь</div>
                <div class="dropdown-item" onclick="App.UI.openPage('upgrade')"><i class="fas fa-bolt"></i> Апгрейд</div>
                <div class="dropdown-item" onclick="App.UI.openPage('contracts')"><i class="fas fa-file-contract"></i> Контракты</div>
            </div>
        </div>
    </div>
</header>

<main id="p-shop">
    <div class="grid" id="cases-list"></div>
</main>

<!-- СТРАНИЦА КЕЙСА (МЕНЮ ПЕРЕД ОТКРЫТИЕМ) -->
<main id="p-case-view" class="hidden">
    <div class="case-hero">
        <h1 class="case-title-big" id="cv-name">Название</h1>
        <img src="" id="cv-img" class="case-main-img">
        <br>
        <button class="open-btn-large" id="cv-open-btn">ОТКРЫТЬ</button>
        <div class="contents-header">Содержимое кейса</div>
        <div class="grid" id="case-contents-grid"></div>
    </div>
</main>

<main id="p-inv" class="hidden">
    <div class="inv-header">
        <div>Предметов: <span id="inv-count" style="color:var(--accent)">0</span></div>
        <div>Сумма: <span id="inv-value" style="color:var(--gold)">0 ₽</span></div>
    </div>
    <div class="grid" id="inv-list"></div>
</main>

<main id="p-upgrade" class="hidden">
    <div class="upgrade-container">
        <div class="circle-box">
            <div class="circle-markers">
                <span class="marker top">100%</span>
                <span class="marker bottom">0%</span>
                <span class="marker left">50%</span>
                <span class="marker right">50%</span>
            </div>
            <div class="visual-circle" id="upg-visual"></div>
            <div class="upg-gradient-overlay"></div>
            <div class="circle-inner">
                <div id="upg-chance" style="font-size: 3.5rem; font-weight: 900; color: #f2f200; line-height: 1;">0.00%</div>
                <div style="color: #8b949e; font-size: 0.9rem; margin-top: 5px;">средний шанс</div>
                <div id="upg-target" style="color:var(--gold); font-size: 1.3rem; font-weight: bold; margin-top: 10px;">0 ₽</div>
                <div id="sel-name" style="font-size: 0.9rem; color: #aaa; margin-top: 5px;">Выберите предмет</div>
                <div id="upg-result-text"></div>
            </div>
            <!-- СТРЕЛКА ШЕВРОН -->
            <div class="chevron-arrow-wrap" id="upg-arrow-wrap">
                <div class="chevron-arrow">
                    <div class="chevron-part"></div>
                    <div class="chevron-part"></div>
                </div>
            </div>
        </div>
        
        <div class="mult-btns">
            <button class="m-btn" onclick="App.Logic.setMult(1.5, this)">1.5x</button>
            <button class="m-btn active" onclick="App.Logic.setMult(2, this)">2x</button>
            <button class="m-btn" onclick="App.Logic.setMult(5, this)">5x</button>
            <button class="m-btn" onclick="App.Logic.setMult(10, this)">10x</button>
        </div>
        
        <button class="btn-main" id="btn-run-upg" disabled onclick="App.Logic.doUpgrade()" style="width:100%; max-width: 300px;">УЛУЧШИТЬ</button>
        <div class="grid" id="upg-inv-list" style="margin-top:20px"></div>
    </div>
</main>

<main id="p-contracts" class="hidden">
    <div class="grid" id="contract-inv-list"></div>
</main>

<!-- Modals -->
<div class="modal" id="modal-profile" onclick="if(event.target===this) App.UI.closeModalBox('modal-profile')">
    <div class="modal-content" style="text-align:center;">
        <h3 id="prof-username" style="color:var(--accent); margin-bottom: 20px;">Игрок</h3>
        <div style="display:flex; gap:10px; margin-bottom: 15px;">
            <button class="btn-main" style="background:#444; flex:1;" onclick="App.Storage.exportData()">Экспорт</button>
            <button class="btn-main" style="background:#444; flex:1;" onclick="document.getElementById('import-file').click()">Импорт</button>
            <input type="file" id="import-file" style="display:none" onchange="App.Storage.importData(event)">
        </div>
        <button class="btn-main" style="width:100%; background:var(--red);" onclick="App.Auth.logout()">ВЫЙТИ</button>
    </div>
</div>

<div class="modal" id="modal-deposit" onclick="if(event.target===this) App.UI.closeModalBox('modal-deposit')">
    <div class="modal-content">
        <h3 style="margin-bottom: 15px; text-align:center;">Пополнение</h3>
        <input type="number" id="dep-amount" placeholder="Сумма" style="width:100%; padding:12px; background:#0d1117; border:1px solid #333; color:white; border-radius:8px;">
        <button class="btn-main" style="width: 100%; margin-top: 15px;" onclick="App.Logic.processDeposit()">ПОПОЛНИТЬ</button>
    </div>
</div>

<div class="modal" id="modal-open" style="background:rgba(0,0,0,0.98);">
    <div id="m-spinner" style="text-align:center; margin:auto;"><h3 style="color: var(--gold);">ОТКРЫВАЕМ КЕЙС...</h3></div>
    <div class="track-wrap hidden" id="roulette-box">
        <div style="position: absolute; left: 50%; top: 0; bottom: 0; width: 4px; background: var(--red); z-index: 10; box-shadow: 0 0 10px var(--red);"></div>
        <div class="track" id="m-track"></div>
    </div>
    <div id="m-result" class="hidden" style="text-align:center;">
        <img id="m-win-icon" class="m-win-icon">
        <h2 id="m-win-name" style="margin-bottom: 5px;">Скин</h2>
        <h1 id="m-win-price" style="color:var(--gold); margin-bottom: 25px;">0 ₽</h1>
        <div style="display:flex; gap:10px; justify-content:center;">
            <button class="btn-main" style="background:var(--green); width:130px;" onclick="App.Logic.finishOpen(true)">ОСТАВИТЬ</button>
            <button class="btn-main" style="background:#444; width:130px;" onclick="App.Logic.finishOpen(false)">ПРОДАТЬ</button>
        </div>
    </div>
</div>

<div id="toast-container"></div>

    init: function() {
        this.Storage.load();
        this.UI.renderShop();
        this.UI.updateUI();
    },

    Generators: {
        // ПОЧИНЕННАЯ ЛОГИКА ОКУПА (50%)
        lootItem: function(casePrice) {
            let rnd = Math.random();
            let priceMult, rarity;

            if (rnd <= 0.50) { // ШАНС ОКУПА 50%
                priceMult = 1.05 + (Math.random() * 3.5); // От 1.05x до 4.5x
                rarity = Math.random() < 0.1 ? 6 : (Math.random() < 0.4 ? 5 : 4);
            } else { // СЛИВ 50%
                // В среднем падает 30-80% от цены
                priceMult = 0.3 + (Math.random() * 0.5); 
                rarity = Math.random() < 0.3 ? 3 : 2;
            }

            let pool = App.skins.catalog[rarity] || App.skins.catalog[2];
            let skin = pool[Math.floor(Math.random() * pool.length)];

            return { 
                name: skin.name, price: Math.floor(casePrice * priceMult), 
                rarity: rarity, iconUrl: skin.img, id: Date.now() + Math.random() 
            };
        }
    },

    Storage: {
        save: () => localStorage.setItem('ib_state', JSON.stringify(App.state)),
        load: () => {
            const data = localStorage.getItem('ib_state');
            if(data) App.state = JSON.parse(data);
        },
        exportData: () => {
            const blob = new Blob([JSON.stringify(App.state)], {type: 'application/json'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'igorbattle_save.json'; a.click();
        },
        importData: (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => { App.state = JSON.parse(ev.target.result); App.Storage.save(); location.reload(); };
            reader.readAsText(file);
        }
    },

    Auth: {
        logout: () => { localStorage.removeItem('ib_state'); location.reload(); }
    },

    Logic: {
        processDeposit: () => {
            let a = parseFloat(document.getElementById('dep-amount').value);
            if(a > 0) { App.state.balance += a; App.Storage.save(); App.UI.updateUI(); App.UI.closeModalBox('modal-deposit'); }
        },

        startOpen: function() {
            const c = App.state.currentCase;
            if(!c || App.state.activeAction) return;
            if(App.state.balance < c.price) return App.UI.showToast("Мало денег!", "error");

            App.state.activeAction = true;
            App.state.balance -= c.price;
            App.state.stats.casesOpened++;
            App.state.stats.totalSpent += c.price;
            App.UI.updateUI();

            const pool = [];
            for(let i=0; i<60; i++) pool.push(App.Generators.lootItem(c.price));
            App.state.currentWin = pool[45];

            App.UI.openModalBox('modal-open');
            document.getElementById('m-spinner').classList.remove('hidden');
            document.getElementById('roulette-box').classList.add('hidden');
            document.getElementById('m-result').classList.add('hidden');

            setTimeout(() => {
                document.getElementById('m-spinner').classList.add('hidden');
                document.getElementById('roulette-box').classList.remove('hidden');
                const track = document.getElementById('m-track');
                track.style.transition = 'none';
                track.style.transform = 'translateX(0)';
                track.innerHTML = pool.map(i => `<div class="t-item" style="border-bottom-color: var(--rarity-${i.rarity})"><img src="${i.iconUrl}" width="85"></div>`).join('');
                
                setTimeout(() => {
                    track.style.transition = 'transform 5s cubic-bezier(0.1, 0, 0.2, 1)';
                    track.style.transform = `translateX(-${(45 * 150) - (window.innerWidth/2) + 75}px)`;
                }, 50);

                setTimeout(() => {
                    document.getElementById('m-result').classList.remove('hidden');
                    document.getElementById('m-win-name').innerText = App.state.currentWin.name;
                    document.getElementById('m-win-price').innerText = App.state.currentWin.price + " ₽";
                    document.getElementById('m-win-icon').src = App.state.currentWin.iconUrl;
                    App.Sounds.playWin();
                }, 5500);
            }, 800);
        },

        finishOpen: function(keep) {
            if(keep) App.state.inventory.push(App.state.currentWin);
            else App.state.balance += App.state.currentWin.price;
            App.state.activeAction = false;
            App.Storage.save();
            App.UI.updateUI();
            App.UI.closeModalBox('modal-open');
            App.UI.openPage('shop');
        },

        setMult: (m, btn) => {
            App.state.mult = m;
            document.querySelectorAll('.m-btn').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');
            App.UI.updateUpgCircle();
        },

        selectForUpg: (id) => {
            if(App.state.activeAction) return;
            App.state.upgSelected = App.state.inventory.find(i => i.id == id);
            App.UI.updateUpgCircle();
            App.UI.renderUpgInv();
        },

        doUpgrade: function() {
            if(!App.state.upgSelected || App.state.activeAction) return;
            App.state.activeAction = true;
            document.getElementById('btn-run-upg').disabled = true;

            const chance = 1 / App.state.mult;
            const isWin = Math.random() <= chance;
            
            // Расчет угла для шеврона
            const fullSpins = 6 + Math.floor(Math.random() * 4);
            const chanceDeg = (1 / App.state.mult) * 360;
            
            // Сектор успеха симметрично снизу (от 180 градусов)
            const startDeg = 180 - (chanceDeg / 2);
            let targetDeg;
            if (isWin) targetDeg = startDeg + (Math.random() * chanceDeg);
            else targetDeg = (startDeg + chanceDeg + (Math.random() * (360 - chanceDeg))) % 360;

            const finalRotation = (fullSpins * 360) + targetDeg;
            document.getElementById('upg-arrow-wrap').style.transform = `rotate(${finalRotation}deg)`;

            setTimeout(() => {
                const res = document.getElementById('upg-result-text');
                res.style.display = 'block';
                if(isWin) {
                    res.innerText = "УСПЕХ"; res.style.color = "#70ff4d";
                    App.state.upgSelected.price = Math.floor(App.state.upgSelected.price * App.state.mult);
                    App.state.upgSelected.rarity = 6;
                } else {
                    res.innerText = "ПРОВАЛ"; res.style.color = "#ff3e3e";
                    App.state.inventory = App.state.inventory.filter(i => i.id !== App.state.upgSelected.id);
                }

                setTimeout(() => {
                    App.state.activeAction = false;
                    App.state.upgSelected = null;
                    res.style.display = 'none';
                    document.getElementById('upg-arrow-wrap').style.transition = 'none';
                    document.getElementById('upg-arrow-wrap').style.transform = 'rotate(0deg)';
                    setTimeout(() => document.getElementById('upg-arrow-wrap').style.transition = 'transform 6s cubic-bezier(0.1, 0, 0.1, 1)', 50);
                    App.Storage.save(); App.UI.updateUI(); App.UI.renderUpgInv(); App.UI.updateUpgCircle();
                }, 2500);
            }, 6100);
        }
    },

    UI: {
        updateUI: () => {
            document.getElementById('balance').innerText = Math.floor(App.state.balance).toLocaleString() + " ₽";
            document.getElementById('prof-username').innerText = App.currentUser;
        },
        toggleMenu: () => document.getElementById('userDropdown').classList.toggle('active'),
        openModalBox: (id) => document.getElementById(id).classList.add('active'),
        closeModalBox: (id) => document.getElementById(id).classList.remove('active'),
        showToast: (m, t) => {
            const c = document.getElementById('toast-container');
            const e = document.createElement('div'); e.className = 'toast'; e.innerText = m;
            c.appendChild(e); setTimeout(() => e.remove(), 3000);
        },
        openPage: (p) => {
            document.querySelectorAll('main').forEach(m => m.classList.add('hidden'));
            document.getElementById('p-' + p).classList.remove('hidden');
            document.getElementById('userDropdown').classList.remove('active');
            if(p == 'inv') App.UI.renderInv();
            if(p == 'upgrade') App.UI.renderUpgInv();
        },
        renderShop: () => {
            document.getElementById('cases-list').innerHTML = App.config.cases.map(c => `
                <div class="card" onclick="App.UI.showCaseView('${c.name}')">
                    <div class="case-display" style="background-image: url('${c.image}');"></div>
                    <div style="font-weight:bold; min-height: 40px; display:flex; align-items:center;">${c.name}</div>
                    <div class="card-price">${c.price.toLocaleString()} ₽</div>
                </div>
            `).join('');
        },
        // НОВОЕ МЕНЮ КЕЙСА
        showCaseView: (name) => {
            const c = App.config.cases.find(x => x.name == name);
            App.state.currentCase = c;
            App.UI.openPage('case-view');
            document.getElementById('cv-name').innerText = c.name;
            document.getElementById('cv-img').src = c.image;
            document.getElementById('cv-open-btn').innerText = `ОТКРЫТЬ ЗА ${c.price.toLocaleString()} ₽`;
            document.getElementById('cv-open-btn').onclick = () => App.Logic.startOpen();
            
            let contents = "";
            [6,5,4,3,2].forEach(rar => {
                App.skins.catalog[rar]?.forEach(s => {
                    contents += `<div class="card" style="border-bottom:3px solid var(--rarity-${rar})"><img src="${s.img}" class="skin-icon"><div>${s.name}</div></div>`;
                });
            });
            document.getElementById('case-contents-grid').innerHTML = contents;
        },
        renderInv: () => {
            const arr = App.state.inventory;
            document.getElementById('inv-count').innerText = arr.length;
            document.getElementById('inv-value').innerText = arr.reduce((a,b)=>a+b.price, 0).toLocaleString() + " ₽";
            document.getElementById('inv-list').innerHTML = arr.map(i => `
                <div class="card inv-card" style="border-bottom-color: var(--rarity-${i.rarity})">
                    <img src="${i.iconUrl}" class="skin-icon">
                    <div style="font-size:0.75rem; font-weight:bold;">${i.name}</div>
                    <div class="card-price">${i.price.toLocaleString()} ₽</div>
                </div>
            `).join('') || "<p style='grid-column:1/-1; color:gray;'>Инвентарь пуст</p>";
        },
        renderUpgInv: () => {
            document.getElementById('upg-inv-list').innerHTML = App.state.inventory.map(i => `
                <div class="card ${App.state.upgSelected?.id == i.id ? 'selected':''}" onclick="App.Logic.selectForUpg('${i.id}')">
                    <img src="${i.iconUrl}" width="60">
                    <div style="font-size:0.7rem; margin-top:5px;">${i.price.toLocaleString()} ₽</div>
                </div>
            `).join('') || "<p style='grid-column:1/-1; color:gray;'>Нет предметов</p>";
        },
        updateUpgCircle: () => {
            if(!App.state.upgSelected) {
                document.getElementById('upg-visual').style.background = "radial-gradient(circle, transparent 40%, rgba(255, 62, 62, 0.1) 41%)";
                document.getElementById('upg-chance').innerText = "0.00%";
                document.getElementById('upg-target').innerText = "0 ₽";
                document.getElementById('btn-run-upg').disabled = true;
                return;
            }
            const chance = (1 / App.state.mult);
            const deg = chance * 360;
            document.getElementById('upg-chance').innerText = (chance * 100).toFixed(2) + "%";
            document.getElementById('upg-target').innerText = Math.floor(App.state.upgSelected.price * App.state.mult).toLocaleString() + " ₽";
            document.getElementById('sel-name').innerText = App.state.upgSelected.name;
            
            // ЗАПОЛНЕНИЕ ПАРАЛЛЕЛЬНО С САМОГО НИЗА (180 градусов)
            const startDeg = 180 - (deg / 2);
            document.getElementById('upg-visual').style.background = `conic-gradient(from ${startDeg}deg, #52a038 0deg ${deg}deg, transparent ${deg}deg 360deg)`;
            document.getElementById('btn-run-upg').disabled = false;
        }
    },

    Sounds: {
        enabled: true,
        toggle: () => { App.Sounds.enabled = !App.Sounds.enabled; document.getElementById('sound-btn').className = App.Sounds.enabled ? 'fas fa-volume-up icon-btn' : 'fas fa-volume-mute icon-btn'; },
        playWin: () => { /* звук */ }
    },
    Daily: { claim: () => App.UI.showToast("Бонус получен!", "success") },
    Promo: { use: () => {} }
};

window.onload = () => App.init();
</script>

</body>
