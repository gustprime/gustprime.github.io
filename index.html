<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>IGORBattle CS2 Elite</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0d1117;
            --panel: #161b22;
            --accent: #58a6ff;
            --gold: #f29100;
            --red: #ff3e3e; 
            --green: #238636;
            --rarity-2: #4b69ff;
            --rarity-3: #8847ff;
            --rarity-4: #d32ce6;
            --rarity-5: #eb4b4b;
            --rarity-6: #ffd700;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: #c9d1d9; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        header { padding: 15px; background: var(--panel); display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #30363d; z-index: 100; }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .balance-pill { display: flex; align-items: center; background: #21262d; border: 1px solid var(--gold); border-radius: 20px; overflow: hidden; height: 36px; transition: 0.3s; }
        .balance-tag { padding: 0 12px; color: var(--gold); font-weight: 800; font-size: 0.9rem; }
        .add-balance { background: var(--gold); color: #000; border: none; width: 36px; height: 100%; font-weight: 900; cursor: pointer; transition: 0.2s; }

        .header-icons { display: flex; gap: 15px; align-items: center; margin-left: 15px; }
        .icon-btn { font-size: 1.4rem; color: #8b949e; cursor: pointer; transition: 0.2s; position: relative; }
        .icon-btn:hover { color: var(--accent); }

        .dropdown { position: absolute; top: 55px; right: 10px; background: var(--panel); border: 1px solid #30363d; border-radius: 12px; width: 220px; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 1000; }
        .dropdown.active { display: block; animation: fadeInDown 0.2s ease; }
        .dropdown-item { padding: 12px 15px; border-bottom: 1px solid #30363d; display: flex; align-items: center; gap: 10px; font-size: 0.9rem; cursor: pointer; transition: 0.2s; }

        main { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 80px; position: relative; z-index: 1; }
        .hidden { display: none !important; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; max-width: 1200px; margin: 0 auto; }
        .card { background: var(--panel); border-radius: 12px; padding: 15px; text-align: center; border: 1px solid #30363d; cursor: pointer; position: relative; transition: 0.2s; display: flex; flex-direction: column; align-items: center;}
        .card:hover { transform: scale(1.03); border-color: #444; }
        .card-price { color: var(--gold); font-weight: bold; margin-top: 5px; }

        /* CASE DETAIL PAGE */
        .case-detail-wrap { max-width: 1000px; margin: 0 auto; text-align: center; padding-top: 20px; }
        .case-title-big { font-size: 2.2rem; font-weight: 900; text-transform: uppercase; margin-bottom: 30px; letter-spacing: 2px; }
        .case-img-big { width: 300px; height: 300px; object-fit: contain; margin-bottom: 30px; filter: drop-shadow(0 0 30px rgba(242, 145, 0, 0.2)); }
        .case-info-line { margin-bottom: 40px; border-top: 1px solid #333; padding-top: 20px; color: #8b949e; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; font-size: 0.8rem; }

        .case-display {
            position: relative; width: 120px; height: 120px; margin: 0 auto 15px;
            border-radius: 12px; background-color: #21262d; border: 2px solid #3a4050;
            box-shadow: 0 8px 0 #0d0f14, 0 15px 20px rgba(0,0,0,0.6);
            background-size: 80%; background-position: center; background-repeat: no-repeat;
            transform: perspective(500px) rotateX(5deg); transition: 0.3s;
        }

        .skin-icon { width: 80px; height: 80px; object-fit: contain; margin-bottom: 8px; filter: drop-shadow(0 0 8px rgba(255,255,255,0.1)); }

        /* UPGRADE WHEEL (CASE-BATTLE STYLE) */
        .upgrade-container { text-align: center; padding: 10px; max-width: 800px; margin: 0 auto;}
        
        .circle-box { 
            position: relative; 
            width: 340px; height: 340px; 
            margin: 40px auto; 
            background: #11141a; 
            border-radius: 50%; 
            border: 10px solid #2a313c; 
            box-shadow: 0 0 40px rgba(0,0,0,0.8); 
        }

        /* Метки процентов вокруг */
        .circle-label { position: absolute; font-weight: 900; color: #4a515e; font-size: 0.9rem; pointer-events: none; }
        .label-100 { top: -30px; left: 50%; transform: translateX(-50%); color: var(--green); }
        .label-50-l { left: -40px; top: 50%; transform: translateY(-50%); }
        .label-50-r { right: -40px; top: 50%; transform: translateY(-50%); }
        .label-0 { bottom: -35px; left: 50%; transform: translateX(-50%); color: var(--red); }
        
        .visual-circle { 
            position: absolute; inset: 0; 
            border-radius: 50%; 
            transition: background 0.3s;
            filter: blur(1px);
        }
        
        .circle-inner { 
            position: absolute; inset: 30px; 
            background: #0d1117; 
            border-radius: 50%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 15; 
            border: 3px solid #2a313c; 
            box-shadow: inset 0 0 30px #000;
        }

        /* Стрелка-шеврон из скриншота */
        .chevron-arrow-wrap {
            position: absolute;
            inset: 0;
            z-index: 30;
            transition: transform 6s cubic-bezier(0.1, 0, 0.1, 1);
            transform: rotate(0deg);
        }
        .chevron-arrow {
            position: absolute;
            bottom: -15px; /* Указывает на 0% внизу */
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .chevron-part {
            width: 24px; height: 10px;
            background: #70ff4d; /* Ярко-зеленый неон */
            clip-path: polygon(50% 0%, 100% 100%, 50% 70%, 0% 100%);
            margin-bottom: -4px;
            filter: drop-shadow(0 0 8px #70ff4d);
            box-shadow: 0 0 15px #70ff4d;
        }
        .chevron-part:nth-child(2) { opacity: 0.5; }

        .btn-main { width: 100%; max-width: 250px; padding: 15px; border-radius: 10px; border: none; font-weight: bold; background: var(--accent); color: white; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .btn-main:hover { filter: brightness(1.1); transform: translateY(-2px); }

        .track-wrap { width: 100%; height: 160px; overflow: hidden; position: relative; background: #050505; border-top: 1px solid #333; border-bottom: 1px solid #333; }
        .track { display: flex; position: absolute; height: 100%; align-items: center; left: 0; }
        .t-item { min-width: 130px; height: 140px; background: #161b22; margin: 0 5px; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-bottom: 4px solid #333; }
        
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); z-index: 500; display: none; flex-direction: column; align-items: center; justify-content: center; opacity: 0; transition: 0.3s; }
        .modal.active { display: flex; opacity: 1; }
        .modal-content { background: var(--panel); padding: 20px; border-radius: 15px; width: 90%; max-width: 400px; border: 1px solid #30363d; }

        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: var(--panel); border-left: 4px solid var(--accent); padding: 15px 20px; border-radius: 8px; color: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.5); font-size: 0.9rem; display: flex; align-items: center; gap: 10px; animation: toastIn 0.3s; }

        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes toastIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        @keyframes burnItem { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(0); opacity: 0; } }
        .burn-anim { animation: burnItem 0.8s forwards; }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <div onclick="App.UI.openPage('shop')" style="font-weight: 900; font-size: 1.2rem; cursor:pointer">IGOR<span style="color:var(--gold)">BATTLE</span></div>
    </div>
    <div style="display: flex; align-items: center;">
        <div class="balance-pill">
            <div class="balance-tag" id="balance">0 ₽</div>
            <button class="add-balance" onclick="App.UI.openModalBox('modal-deposit')">+</button>
        </div>
        <div class="header-icons">
            <i class="fas fa-volume-up icon-btn" id="sound-btn" onclick="App.Sounds.toggle()"></i>
            <i class="fas fa-gift icon-btn" onclick="App.Daily.claim()"></i>
            <i class="fas fa-bars icon-btn" onclick="App.UI.toggleMenu()"></i>
            
            <div class="dropdown" id="userDropdown">
                <div class="dropdown-item" onclick="App.UI.openModalBox('modal-profile'); App.UI.toggleMenu();"><i class="fas fa-user-circle"></i> Профиль</div>
                <div class="dropdown-item" onclick="App.UI.openPage('shop')"><i class="fas fa-box-open"></i> Магазин</div>
                <div class="dropdown-item" onclick="App.UI.openPage('inv')"><i class="fas fa-stream"></i> Инвентарь</div>
                <div class="dropdown-item" onclick="App.UI.openPage('upgrade')"><i class="fas fa-bolt"></i> Апгрейд</div>
            </div>
        </div>
    </div>
</header>

<main id="p-shop">
    <div class="grid" id="cases-list"></div>
</main>

<main id="p-case-detail" class="hidden">
    <div class="case-detail-wrap">
        <h1 class="case-title-big" id="det-title">Название</h1>
        <img id="det-img" src="" class="case-img-big">
        <div>
            <button class="btn-main" id="btn-open-case" style="background:var(--gold); color:#000; font-size:1.2rem; max-width:300px;">Открыть за 0 ₽</button>
        </div>
        <div class="case-info-line">Содержимое кейса</div>
        <div class="grid" id="case-content-grid"></div>
    </div>
</main>

<main id="p-inv" class="hidden">
    <div style="text-align:center; margin-bottom:20px;">
        Предметов: <span id="inv-count" style="color:var(--accent)">0</span> | Сумма: <span id="inv-value" style="color:var(--gold)">0 ₽</span>
    </div>
    <div class="grid" id="inv-list"></div>
</main>

<main id="p-upgrade" class="hidden">
    <div class="upgrade-container">
        <div class="circle-box">
            <div class="circle-label label-100">100%</div>
            <div class="circle-label label-50-l">50%</div>
            <div class="circle-label label-50-r">50%</div>
            <div class="circle-label label-0">0%</div>

            <div class="visual-circle" id="upg-visual"></div>
            <div class="circle-inner">
                <div id="upg-chance" style="font-size: 3.5rem; font-weight: 900; color: #fff;">0%</div>
                <div style="color: #8b949e; font-size: 0.9rem; margin-top: 5px;">средний шанс</div>
                <div id="upg-target" style="color:var(--gold); font-size: 1.4rem; font-weight: bold; margin-top: 10px;">0 ₽</div>
                <div id="sel-name" style="font-size: 0.9rem; color: #aaa; margin-top:5px;">Выберите предмет ниже</div>
                <div id="upg-result-text" style="display:none; position:absolute; z-index:40; font-size:2rem; font-weight:900;"></div>
            </div>
            
            <div class="chevron-arrow-wrap" id="upg-arrow-wrap">
                <div class="chevron-arrow">
                    <div class="chevron-part"></div>
                    <div class="chevron-part"></div>
                </div>
            </div>
        </div>
        
        <div style="display:flex; justify-content:center; gap:10px; margin-bottom:20px;">
            <button class="btn-main" style="width:70px;" onclick="App.Logic.setMult(2)">2x</button>
            <button class="btn-main" style="width:70px;" onclick="App.Logic.setMult(5)">5x</button>
            <button class="btn-main" style="width:70px;" onclick="App.Logic.setMult(10)">10x</button>
        </div>
        
        <button class="btn-main" id="btn-run-upg" disabled onclick="App.Logic.doUpgrade()">УЛУЧШИТЬ</button>
        <div class="grid" id="upg-inv-list" style="margin-top:20px"></div>
    </div>
</main>

<!-- Modals -->
<div class="modal" id="modal-deposit" onclick="if(event.target===this) App.UI.closeModalBox('modal-deposit')">
    <div class="modal-content">
        <h3 style="margin-bottom: 15px; text-align:center;">Пополнение</h3>
        <input type="number" id="dep-amount" placeholder="Сумма" style="width:100%; padding:12px; background:#0d1117; border:1px solid #333; color:#fff; border-radius:8px;">
        <button class="btn-main" style="width: 100%; margin-top:15px;" onclick="App.Logic.processDeposit()">ПОПОЛНИТЬ</button>
    </div>
</div>

<div class="modal" id="modal-profile">
    <div class="modal-content">
        <h3 id="prof-username" style="color:var(--accent); text-align:center;">Игрок</h3>
        <button class="btn-main" style="width:100%; background:var(--red); margin-top:15px;" onclick="App.Auth.logout()">ВЫЙТИ</button>
        <button class="btn-main" style="width:100%; background:#444;" onclick="App.UI.closeModalBox('modal-profile')">ЗАКРЫТЬ</button>
    </div>
</div>

<div class="modal" id="modal-open" style="background:rgba(0,0,0,0.95);">
    <div id="m-spinner" class="hidden" style="text-align:center; margin:auto;">
        <h3 style="color: var(--gold);">ОТКРЫВАЕМ...</h3>
    </div>
    <div class="track-wrap" id="roulette-box">
        <div style="position: absolute; left: 50%; top: 0; bottom: 0; width: 3px; background: var(--red); z-index: 10;"></div>
        <div class="track" id="m-track"></div>
    </div>
    <div id="m-result" class="hidden" style="text-align:center;">
        <img id="m-win-icon" class="m-win-icon" style="width:180px;">
        <h2 id="m-win-name" style="margin-bottom: 10px;">Скин</h2>
        <h1 id="m-win-price" style="color:var(--gold); margin-bottom: 20px;">0 ₽</h1>
        <div style="display:flex; gap:10px; justify-content:center;">
            <button class="btn-main" style="background:var(--green); width:130px;" onclick="App.Logic.finishOpen(true)">ОСТАВИТЬ</button>
            <button class="btn-main" style="background:#444; width:130px;" onclick="App.Logic.finishOpen(false)">ПРОДАТЬ</button>
        </div>
    </div>
</div>

<div id="toast-container"></div>

    },

    init: function() {
        this.Storage.load();
        this.UI.renderShop();
        this.UI.updateUI();
    },

    Generators: {
        // НОВАЯ ЛОГИКА ОКУПА (35-40% шанс)
        lootItem: function(casePrice) {
            let rnd = Math.random();
            let priceMult, rarity;

            if (rnd <= 0.37) { // ОКУП (37%)
                priceMult = 1.05 + (Math.random() * 4.0); // От 105% до 500%
                rarity = Math.random() < 0.1 ? 6 : (Math.random() < 0.3 ? 5 : 4);
            } else { // СЛИВ (63%)
                // Минимум 10%. В среднем 30-80%.
                priceMult = 0.1 + (Math.random() * 0.75); // От 10% до 85%
                rarity = Math.random() < 0.3 ? 3 : 2;
            }

            let pool = App.skins.catalog[rarity] || App.skins.catalog[2];
            let skin = pool[Math.floor(Math.random() * pool.length)];

            return { 
                name: skin.name, price: Math.floor(casePrice * priceMult), 
                rarity: rarity, iconUrl: skin.img, id: Date.now() + Math.random() 
            };
        }
    },

    Storage: {
        save: () => localStorage.setItem('ib_state', JSON.stringify(App.state)),
        load: () => {
            const data = localStorage.getItem('ib_state');
            if(data) App.state = JSON.parse(data);
        }
    },

    Auth: {
        logout: () => { App.state.inventory = []; App.state.balance = 1500; App.Storage.save(); location.reload(); }
    },

    Logic: {
        processDeposit: function() {
            let amt = parseFloat(document.getElementById('dep-amount').value);
            if(amt > 0) { App.state.balance += amt; App.Storage.save(); App.UI.updateUI(); App.UI.closeModalBox('modal-deposit'); }
        },

        startOpen: function() {
            const c = App.state.currentCase;
            if(!c || App.state.activeAction) return;
            if(App.state.balance < c.price) return App.UI.showToast("Недостаточно средств!", "error");

            App.state.activeAction = true;
            App.state.balance -= c.price;
            App.UI.updateUI();

            const pool = [];
            for(let i=0; i<60; i++) pool.push(App.Generators.lootItem(c.price));
            App.state.currentWin = pool[45];

            App.UI.openModalBox('modal-open');
            document.getElementById('m-spinner').classList.remove('hidden');
            document.getElementById('roulette-box').classList.add('hidden');
            document.getElementById('m-result').classList.add('hidden');

            setTimeout(() => {
                document.getElementById('m-spinner').classList.add('hidden');
                document.getElementById('roulette-box').classList.remove('hidden');
                const track = document.getElementById('m-track');
                track.style.transition = 'none';
                track.style.transform = 'translateX(0)';
                track.innerHTML = pool.map(i => `
                    <div class="t-item" style="border-bottom-color: var(--rarity-${i.rarity})">
                        <img src="${i.iconUrl}" width="80">
                        <span style="font-size:0.7rem; font-weight:bold; margin-top:5px;">${i.price} ₽</span>
                    </div>
                `).join('');

                setTimeout(() => {
                    track.style.transition = 'transform 5s cubic-bezier(0.1, 0, 0.2, 1)';
                    track.style.transform = `translateX(-${(45 * 140) - (window.innerWidth/2) + 70}px)`;
                }, 50);

                setTimeout(() => {
                    document.getElementById('m-result').classList.remove('hidden');
                    document.getElementById('m-win-name').innerText = App.state.currentWin.name;
                    document.getElementById('m-win-price').innerText = App.state.currentWin.price + " ₽";
                    document.getElementById('m-win-icon').src = App.state.currentWin.iconUrl;
                    App.Sounds.playWin();
                }, 5500);
            }, 800);
        },

        finishOpen: function(keep) {
            if(keep) App.state.inventory.push(App.state.currentWin);
            else App.state.balance += App.state.currentWin.price;
            App.state.activeAction = false;
            App.Storage.save();
            App.UI.updateUI();
            App.UI.closeModalBox('modal-open');
            App.UI.openPage('shop');
        },

        setMult: (m) => { App.state.mult = m; App.UI.updateUpgCircle(); },

        selectForUpg: (id) => {
            App.state.upgSelected = App.state.inventory.find(i => i.id == id);
            App.UI.updateUpgCircle();
            App.UI.renderUpgInv();
        },

        doUpgrade: function() {
            if(!App.state.upgSelected || App.state.activeAction) return;
            App.state.activeAction = true;
            document.getElementById('btn-run-upg').disabled = true;

            const chance = 1 / App.state.mult;
            const isWin = Math.random() <= chance;
            
            // Расчет угла для новой стрелки-шеврона
            const fullSpins = 5 + Math.floor(Math.random() * 5);
            const chanceDeg = (1 / App.state.mult) * 360;
            
            // Сектор успеха у нас начинается с 180deg (низ) и идет по часовой стрелке
            let targetDeg;
            if (isWin) {
                targetDeg = 180 + (Math.random() * (chanceDeg - 10)); // Внутри зеленого
            } else {
                targetDeg = 180 + chanceDeg + (Math.random() * (360 - chanceDeg - 10)); // Вне
            }

            const finalRotation = (fullSpins * 360) + targetDeg;
            document.getElementById('upg-arrow-wrap').style.transform = `rotate(${finalRotation}deg)`;

            setTimeout(() => {
                const res = document.getElementById('upg-result-text');
                res.style.display = 'block';
                if(isWin) {
                    res.innerText = "УСПЕХ"; res.style.color = "#70ff4d";
                    App.state.upgSelected.price = Math.floor(App.state.upgSelected.price * App.state.mult);
                    App.state.upgSelected.name = "★ " + App.state.upgSelected.name;
                    App.state.upgSelected.rarity = 6;
                } else {
                    res.innerText = "ПРОВАЛ"; res.style.color = "#ff3e3e";
                    App.state.inventory = App.state.inventory.filter(i => i.id !== App.state.upgSelected.id);
                }

                setTimeout(() => {
                    App.state.activeAction = false;
                    App.state.upgSelected = null;
                    res.style.display = 'none';
                    document.getElementById('upg-arrow-wrap').style.transition = 'none';
                    document.getElementById('upg-arrow-wrap').style.transform = 'rotate(0deg)';
                    setTimeout(() => document.getElementById('upg-arrow-wrap').style.transition = 'transform 6s cubic-bezier(0.1, 0, 0.1, 1)', 50);
                    App.Storage.save(); App.UI.updateUI(); App.UI.renderUpgInv(); App.UI.updateUpgCircle();
                }, 2000);
            }, 6200);
        }
    },

    UI: {
        updateUI: () => {
            document.getElementById('balance').innerText = Math.floor(App.state.balance).toLocaleString() + " ₽";
        },
        toggleMenu: () => document.getElementById('userDropdown').classList.toggle('active'),
        openModalBox: (id) => document.getElementById(id).classList.add('active'),
        closeModalBox: (id) => document.getElementById(id).classList.remove('active'),
        showToast: (m, t) => {
            const c = document.getElementById('toast-container');
            const e = document.createElement('div'); e.className = 'toast'; e.innerText = m;
            c.appendChild(e); setTimeout(() => e.remove(), 3000);
        },
        openPage: (p) => {
            document.querySelectorAll('main').forEach(m => m.classList.add('hidden'));
            document.getElementById('p-' + p).classList.remove('hidden');
            if(p == 'inv') App.UI.renderInv();
            if(p == 'upgrade') App.UI.renderUpgInv();
        },
        renderShop: () => {
            document.getElementById('cases-list').innerHTML = App.config.cases.map(c => `
                <div class="card" onclick="App.UI.showCaseDetail('${c.name}')">
                    <div class="case-display" style="background-image: url('${c.image}');"></div>
                    <div style="font-weight:bold;">${c.name}</div>
                    <div class="card-price">${c.price} ₽</div>
                </div>
            `).join('');
        },
        showCaseDetail: (name) => {
            const c = App.config.cases.find(x => x.name == name);
            App.state.currentCase = c;
            App.UI.openPage('case-detail');
            document.getElementById('det-title').innerText = c.name;
            document.getElementById('det-img').src = c.image;
            document.getElementById('btn-open-case').innerText = `Открыть за ${c.price} ₽`;
            document.getElementById('btn-open-case').onclick = () => App.Logic.startOpen();
            
            // Наполняем фейковым содержимым для красоты (как на скриншоте)
            let contents = "";
            [6,5,4,3,2].forEach(rar => {
                App.skins.catalog[rar].forEach(s => {
                    contents += `<div class="card" style="border-bottom:3px solid var(--rarity-${rar})"><img src="${s.img}" class="skin-icon"><div>${s.name}</div></div>`;
                });
            });
            document.getElementById('case-content-grid').innerHTML = contents;
        },
        renderInv: () => {
            document.getElementById('inv-count').innerText = App.state.inventory.length;
            document.getElementById('inv-value').innerText = App.state.inventory.reduce((a,b)=>a+b.price, 0).toLocaleString() + " ₽";
            document.getElementById('inv-list').innerHTML = App.state.inventory.map(i => `
                <div class="card" style="border-bottom:3px solid var(--rarity-${i.rarity})">
                    <img src="${i.iconUrl}" class="skin-icon">
                    <div style="font-size:0.75rem; font-weight:bold;">${i.name}</div>
                    <div class="card-price">${i.price} ₽</div>
                </div>
            `).join('') || "<p style='grid-column:1/-1; color:gray;'>Инвентарь пуст</p>";
        },
        renderUpgInv: () => {
            document.getElementById('upg-inv-list').innerHTML = App.state.inventory.map(i => `
                <div class="card ${App.state.upgSelected?.id == i.id ? 'selected':''}" onclick="App.Logic.selectForUpg('${i.id}')">
                    <img src="${i.iconUrl}" width="60">
                    <div style="font-size:0.7rem;">${i.price} ₽</div>
                </div>
            `).join('') || "<p style='grid-column:1/-1; color:gray;'>Нет предметов</p>";
        },
        updateUpgCircle: () => {
            if(!App.state.upgSelected) {
                document.getElementById('upg-visual').style.background = "none";
                document.getElementById('upg-chance').innerText = "0%";
                document.getElementById('btn-run-upg').disabled = true;
                return;
            }
            const chance = (1 / App.state.mult);
            const deg = chance * 360;
            document.getElementById('upg-chance').innerText = (chance * 100).toFixed(1) + "%";
            document.getElementById('upg-target').innerText = Math.floor(App.state.upgSelected.price * App.state.mult) + " ₽";
            document.getElementById('sel-name').innerText = App.state.upgSelected.name;
            
            // Сектор окупа начинается снизу (180deg)
            document.getElementById('upg-visual').style.background = `conic-gradient(from 180deg, #52a038 0deg ${deg}deg, transparent ${deg}deg 360deg)`;
            document.getElementById('btn-run-upg').disabled = false;
        }
    },

    Sounds: {
        enabled: true,
        toggle: () => { App.Sounds.enabled = !App.Sounds.enabled; document.getElementById('sound-btn').className = App.Sounds.enabled ? 'fas fa-volume-up icon-btn' : 'fas fa-volume-mute icon-btn'; },
        playWin: () => { /* звук */ }
    },
    Daily: { claim: () => App.UI.showToast("Бонус получен!", "success") },
    Auth: { requireAuth: () => true }
};

window.onload = () => App.init();
</script>
